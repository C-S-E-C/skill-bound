<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- External CSS Files -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- External JavaScript Libraries -->
    <script src="js/translate.min.js"></script>
    <script src="js/cache.js"></script>
</head>
<body>
    <audio id="background-music" loop style="display:none;">
        <source src="music/waiting.mp3" type="audio/mp3">
    </audio>
    <div id="top-bar">
        <p id="energy" onclick="window.open('energy.html','_blank')"></p>
        <p id="coins"></p>
        <button id="settings" onclick="window.open('settings.html','_blank')">⚙️</button>
    </div>
    <div id="controls">
        <button id="map">Map</button>
        <button id="fight" onclick="window.location.href='pair.html'">Fight!</button>
        <button id="manual">Manual</button>
    </div>
    <!-- Page-specific script -->
    <script src="js/dashboard.js"></script>
</body>
</html>

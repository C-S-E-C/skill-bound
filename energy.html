<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 基础样式重置 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* 深灰近黑背景 */
            color: #e0e0e0; /* 浅灰色文字，避免纯白刺眼 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 容器卡片 */
        .container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 1px solid #333;
        }

        /* 汇率文本 */
        #ExchangeRate {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: #00e676; /* 亮绿色，突出汇率 */
            font-weight: 500;
        }

        /* 按钮美化 */
        .buy-button {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #6200ee, #3700b3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(98, 0, 238, 0.3);
        }

        .buy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(98, 0, 238, 0.5);
            background: linear-gradient(135deg, #7c4dff, #6200ee);
        }

        .buy-button:active {
            transform: translateY(0);
        }

        /* 加载中的占位样式 */
        #ExchangeRate:empty::before {
            content: "正在获取汇率...";
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-top: 0; font-weight: 300;">硬币兑换</h2>
        <p id="ExchangeRate"></p>
        <p style="font-size: 0.9rem; color: #888;" id="me"></p>
        <a href="https://www.ifdian.net/item/3ee256e62f3e11f1a1c352540025c377" class="buy-button">立即购买 (1 CNY)</a>
        <input type="text" id="redeem-code" placeholder="输入兑换码" style="margin-top: 1.5rem; padding: 10px; width: 80%; border-radius: 8px; border: none; background-color: #333; color: #e0e0e0;">
        <button onclick="redeemCode()" style="margin-top: 1rem; padding: 10px 20px; border-radius: 8px; border: none; background-color: #6200ee; color: white; font-weight: bold;">兑换</button>
    </div>

    <script>
        document.getElementById("me").innerHTML = "当前能量: " + sessionStorage.getItem("energy");
        fetch("dynamic.json")
            .then(response => response.json())
            .then(data => {
                document.getElementById("ExchangeRate").innerHTML = 
                    "<span style='font-size: 1.5rem;'>" + data.ExchangeRate + " Coin </span> = 1 CNY";
            })
            .catch(err => {
                document.getElementById("ExchangeRate").innerText = "无法加载汇率";
                console.error(err);
            });
    </script>
</body>
</html>

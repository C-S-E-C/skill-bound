<!DOCTYPE html>
<html>
<head>
    <title>SKILL BOUND</title>
    <script src="js/basic.min.js"></script>
    <script>
        localStorage.setItem('你来到了这里','就没想过好好玩吧');
        if ("WebSocket" in window) {if (isWeChat()) {alert('请注意：微信浏览器可能无法正常使用此应用程序。建议使用其他浏览器访问。\n\nPlease note: WeChat browser may not work properly with this application. It is highly recommended to use another browser to access it.');}} else {document.write("你的浏览器不支持WebSockets,请用现代浏览器访问。\n\nYour browser does not support WebSockets. Please use a modern browser to access this application.");}
    </script>
    <style>
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        noscript {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        #syntropica-logo {
            text-align: center;
            color: #fff;
            position: relative;
            z-index: 10;
        }
        #syntropica-logo img {
            width: 400px;
            height: 400px;
            margin-bottom: 20px;
        }
        #syntropica-logo h1 {
            font-size: 55px;
            margin: 0;
        }
        @keyframes blur-in-and-out {
            0% {
                filter: blur(10px);
                opacity: 0;
            }
            25% {
                filter: blur(0);
                opacity: 1;
            }
            75% {
                filter: blur(0);
                opacity: 1;
            }
            100% {
                filter: blur(10px);
                opacity: 0;
            }
        }

        .loaded {
            position: relative;
            text-align: center;
            align-self: center;
            color: #fff;
            display: none;
        }
        #warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
        }
        #warning h1 {
            font-size: 48px;
            color: #ff4444;
            margin-bottom: 20px;
        }
        #warning p {
            font-size: 24px;
            margin-bottom: 40px;
            max-width: 80%;
        }
        #start-game {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #start-game:hover {
            transform: scale(1.05);
        }
        main {
            width: 100%;
            height: 100%;
            position: relative;
        }
    </style>
</head>
<body>
    <main>
        <div id="syntropica-logo">
            <img src="https://assets.r2.syntropica.top/logo/white.black.svg" alt="Syntropica Logo">
            <h1>Syntropica Presents</h1>
        </div>
        <div id="warning">
            <h1>WARNING</h1>
            <p>本游戏可能会有光敏反应，请确保在光线充足的环境下进行游戏。</p>
            <button id="start-game">开始游戏</button>
        </div>
        <h1 class="loaded" style="font-size: 75px;">SKILL BOUND</h1>
        <h3 class="loaded" style="margin-top:75%;">&gt; &nbsp; Press anywhere to continue &nbsp; &lt;</h3>
    </main>
    <audio id="background-music" loop style="display:none;">
        <source src="music/background.mka" type="audio/mp3">
    </audio>
    <video class="loaded" style="height:100%; width:100%; z-index:-1; position:absolute; margin:0; object-fit: fill;" src="https://vdse.bdstatic.com//192d9a98d782d9c74c96f09db9378d93.mp4" preload="auto" playsinline autoplay muted loop></video>
    <script>
        var warningDiv = document.getElementById('warning');
        var startBtn = document.getElementById('start-game');
        var bgMusic = document.getElementById('background-music');
        var logoDiv = document.getElementById('syntropica-logo');
        var loadedElements = document.getElementsByClassName('loaded');
        var videoBg = document.querySelector('video');
        
        function playMusic() {
            if (bgMusic) {
                bgMusic.play().catch(function(e) {
                    console.log('音乐播放失败:', e);
                });
            }
        }
        
        function startGame() {
            warningDiv.style.display = 'none';
            playMusic();
            logoDiv.style.animationName = 'blur-in-and-out';
            logoDiv.style.animationDuration = '5s';
            logoDiv.style.animationTimingFunction = 'ease-in';
            logoDiv.style.animationFillMode = 'forwards';
        }
        
        startBtn.onclick = startGame;
        
        logoDiv.addEventListener('animationend', function() {
            console.log('Animation ended');
            logoDiv.style.display = 'none';
            for (var i = 0; i < loadedElements.length; i++) {
                loadedElements[i].style.display = 'block';
            }
            if (videoBg) {
                videoBg.style.display = 'block';
            }
            document.body.onclick = function() {
                window.location.href = 'login.html';
            }
        });
    </script>
    <noscript>
        <p>JavaScript is required to run this application. Please enable JavaScript in your browser settings.</p>
        <p>If you are unable to enable JavaScript, please download a browser that supports JavaScript.</p>
    </noscript>
</body>
</html>

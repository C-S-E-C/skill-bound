<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena</title>
    <!-- External CSS Files -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pair.css">
    <script src="js/translate.min.js"></script>
    <script src="js/basic.js"></script>
</head>
<body>
    <audio id="background-music" loop style="display:none;">
        <source src="music/waiting.mp3" type="audio/mp3">
    </audio>

    <main id="screen1">
        <h1>Select Battlefield</h1>
        <div class="selection-group">
            <select id="map-choice"></select>
        </div>

        <h1>Battle Mode</h1>
        <div class="selection-group">
            <select id="mode-choice">
                <option value="1">1 VS 1</option>
                <option value="2">2 VS 2</option>
                <option value="3">3 VS 3</option>
                <option value="4">4 VS 4</option>
            </select>
        </div>

        <button id="start-fight">START FIGHT</button>
    </main>

    <main id="screen2">
        <h1 id="status-text"><span id="loading-animation"></span>Searching for opponents</h1>
        <br/>
        <div id="people">
            <div id="our-team" class="team-container ours"></div>
            <div class="vs-text">VS</div>
            <div id="opponent-team" class="team-container opponent"></div>
        </div>
        <button id="start-battle" style="margin-top:30px; font-size: 1rem; padding: 10px 30px;" disabled>START</button>
    </main>
    
    <!-- Page-specific script -->
    <script src="js/pair.js"></script>
</body>
</html>

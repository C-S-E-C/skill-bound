<style>
    body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background-repeat: repeat;
    }
</style>
<input type="text"  />
<button onclick="render()">提交</button>
<script>
    // wait when the page is fully loaded
    window.onload = function () {
        const input = document.querySelector('input').value = "images/water.webp";
    }
    function render() {
        const input = document.querySelector('input').value;
        document.body.style.backgroundImage = `url(${input})`;
    }
</script>
